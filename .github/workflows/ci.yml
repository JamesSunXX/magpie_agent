name: CI

on:
  push:
    branches:
      - main
      - 'sch/**'
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:run
      - run: npx tsc --noEmit
      - run: npm run check:boundaries
      - run: npm run dev -- --help
